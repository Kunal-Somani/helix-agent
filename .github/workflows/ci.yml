name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov black flake8 mypy
      
      - name: Lint with flake8
        run: flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Format check with black
        run: black --check backend/app
      
      - name: Type check with mypy
        run: mypy backend/app --ignore-missing-imports || true
      
      - name: Run tests
        run: pytest backend/tests -v --cov=backend/app --cov-report=xml || true

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -f backend/Dockerfile -t llm-quiz-solver:${{ github.sha }} .
      
      - name: Test Docker image
        run: |
          docker run --rm llm-quiz-solver:${{ github.sha }} \
            python -c "from app.config import settings; print('✓ Config loads successfully')"

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'backend'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
